<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QPI.money</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .landing-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 600px;
            background-color: #FFFFFF;
            font-family: 'Roboto', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            text-align: center;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.03);
            margin: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }
        
        .logo-img {
            width: 450px;
            max-width: 90%;
            height: auto;
            margin-bottom: 35px;
        }
        
        .cta-button {
            display: inline-block;
            background-color: #A0522D;
            color: #ffffff !important;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(160, 82, 45, 0.25);
        }
        
        .cta-button:hover {
            background-color: #8B4513;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 69, 19, 0.35);
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <img src="QPi.money Logo.png" alt="QPI.money Logo" class="logo-img">
        
        <a href="https://discord.gg/yTaaqF6E" target="_blank" class="cta-button">Join Telegram Channel</a>
    </div>
</body>
</html>
