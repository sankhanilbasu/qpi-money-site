<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QPI.money</title>
    
    <link rel="icon" href="https://raw.githubusercontent.com/sankhanilbasu/qpi-money-site/main/QPi.money%20Logo.png" type="image/png">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #FFFFFF;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-family: 'Roboto', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        /* Centers the main box in the middle of the screen */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .landing-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #FFFFFF;
            text-align: center;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.03);
            padding: 50px 40px;
            max-width: 800px;
            width: 100%;
            box-sizing: border-box;
        }
        
        .logo-img {
            width: 450px;
            max-width: 90%;
            height: auto;
            margin-bottom: 35px;
        }
        
        .cta-button {
            display: inline-block;
            background-color: #A0522D; /* Copper Brown */
            color: #ffffff !important;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(160, 82, 45, 0.25);
        }
        
        .cta-button:hover {
            background-color: #8B4513;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 69, 19, 0.35);
        }

        /* Minimalist Footer Styling */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            font-size: 0.75rem;
            font-weight: 300;
            color: #8E8E93; /* Apple Subtle Grey */
            border-top: 1px solid #F5F5F7;
        }

        .footer-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qioseon-logo {
            height: 18px; /* Tiny logo size */
            width: auto;
            border-radius: 2px;
            opacity: 0.8; /* Slight fade to match the subtle text */
            transition: opacity 0.3s ease;
        }

        .qioseon-logo:hover {
            opacity: 1; /* Full color on hover */
        }

        /* Mobile Responsiveness for Footer */
        @media (max-width: 600px) {
            .footer {
                flex-direction: column;
                gap: 15px;
                text-align: center;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    
    <div class="main-content">
        <div class="landing-container">
            <img src="https://raw.githubusercontent.com/sankhanilbasu/qpi-money-site/main/QPi.money%20Logo.png" alt="QPI.money Logo" class="logo-img">
            <a href="https://discord.gg/yTaaqF6E" target="_blank" class="cta-button">Join Discord Channel</a>
        </div>
    </div>

    <div class="footer">
        <div class="footer-left">
            &copy; All rights reserved Qioseon Labs LLP 2026
            <img src="https://raw.githubusercontent.com/sankhanilbasu/qpi-money-site/main/qioseon%20logo%202026.jpeg" alt="Qioseon Labs Logo" class="qioseon-logo">
        </div>
        <div class="footer-right">
            
        </div>
    </div>

</body>
</html>
